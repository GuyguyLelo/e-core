{% extends "layout/master.html" %}

{% block title %}Supprimer horaire - e-Core{% endblock %}

{% block page_title %}Supprimer horaire{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Confirmation de suppression</h5>
            </div>
            <div class="card-body">
                <p>Voulez-vous vraiment supprimer l'horaire <strong>{{ horaire }}</strong> ?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'prestation:horaire_detail' horaire.pk %}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-danger">Supprimer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
